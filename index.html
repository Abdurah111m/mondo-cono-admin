<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Mondo Cono · Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --cream:#FFF8F0; --bg:#FBF4EC; --card:#FFFFFF;
  --pink:#FF5C8A; --pink-dark:#E84574; --pink-soft:#FFE4EC;
  --mint:#4ECDC4; --mint-soft:#E0F7F5;
  --cone:#E8B04B; --cone-soft:#FBEFD2;
  --choco:#3A2A24; --muted:#9A8C84; --line:#F0E6DC;
  --blue:#4C8DFF; --blue-soft:#E3EEFF;
  --danger:#E5484D; --danger-soft:#FCE4E4;
  --ok:#2FB66B; --ok-soft:#DEF6E9;
  --shadow:0 6px 20px rgba(58,42,36,.08);
  --shadow-lg:0 16px 40px rgba(58,42,36,.18);
  --radius:18px; --radius-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg); color:var(--choco);
  overscroll-behavior-y:none; -webkit-font-smoothing:antialiased;
}
#app{max-width:560px;margin:0 auto;min-height:100vh;padding:0 0 86px;position:relative;}
h1,h2,h3,.display{font-family:'Fredoka',sans-serif;font-weight:600;letter-spacing:-.01em;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:15px;width:100%;}
a{color:var(--pink);text-decoration:none;}

/* ---------- Top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 12px;
  background:linear-gradient(180deg,var(--cream) 70%,rgba(251,244,236,0));
  backdrop-filter:blur(6px);
}
.wordmark{font-family:'Fredoka';font-weight:700;font-size:21px;color:var(--pink);display:flex;align-items:center;gap:7px;}
.wordmark .tag{font-size:11px;font-weight:600;color:var(--choco);background:var(--cone-soft);
  padding:3px 8px;border-radius:8px;letter-spacing:.04em;text-transform:uppercase;}
.icon-btn{width:38px;height:38px;border-radius:12px;background:var(--card);box-shadow:var(--shadow);
  display:grid;place-items:center;font-size:17px;transition:transform .12s;}
.icon-btn:active{transform:scale(.92);}

/* ---------- Page ---------- */
.page{padding:4px 16px 20px;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.page-title{font-size:24px;margin:6px 2px 16px;}
.section-label{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--muted);margin:22px 4px 10px;}

/* ---------- KPI cards ---------- */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.kpi{background:var(--card);border-radius:var(--radius);padding:15px 15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;right:-14px;top:-14px;width:54px;height:54px;border-radius:50%;opacity:.16;}
.kpi.pink::after{background:var(--pink);} .kpi.mint::after{background:var(--mint);}
.kpi.cone::after{background:var(--cone);} .kpi.blue::after{background:var(--blue);}
.kpi .label{font-size:12px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px;}
.kpi .value{font-family:'Fredoka';font-weight:700;font-size:25px;margin-top:7px;line-height:1.05;}
.kpi .sub{font-size:11.5px;color:var(--muted);margin-top:3px;}

/* ---------- Panel card ---------- */
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-top:13px;}
.panel h3{font-size:16px;margin-bottom:13px;display:flex;align-items:center;gap:8px;}

/* ---------- Bar chart ---------- */
.chart{display:flex;align-items:flex-end;gap:8px;height:130px;padding-top:8px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
.bar{width:100%;max-width:30px;border-radius:7px 7px 4px 4px;
  background:linear-gradient(180deg,var(--pink),var(--pink-dark));transition:height .5s cubic-bezier(.2,.8,.2,1);min-height:3px;}
.bar.empty{background:var(--line);}
.bar-label{font-size:10px;color:var(--muted);font-weight:600;}
.bar-val{font-size:9.5px;color:var(--pink-dark);font-weight:700;height:12px;}

/* ---------- Top product rows ---------- */
.rank-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);}
.rank-row:last-child{border-bottom:none;}
.rank-num{width:24px;height:24px;border-radius:8px;background:var(--pink-soft);color:var(--pink-dark);
  font-weight:700;font-size:12px;display:grid;place-items:center;flex-shrink:0;}
.rank-name{flex:1;font-weight:600;font-size:14px;}
.rank-qty{font-size:13px;color:var(--muted);font-weight:600;}

/* ---------- Status pills ---------- */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;
  font-size:12px;font-weight:700;white-space:nowrap;}
.pill.new{background:var(--blue-soft);color:var(--blue);}
.pill.preparing{background:var(--cone-soft);color:#B8821E;}
.pill.on_the_way{background:var(--mint-soft);color:#1FA89E;}
.pill.delivered{background:var(--ok-soft);color:var(--ok);}
.pill.canceled{background:var(--danger-soft);color:var(--danger);}
.pill.paid{background:var(--ok-soft);color:var(--ok);}
.pill.pending{background:var(--cone-soft);color:#B8821E;}
.pill.refunded{background:var(--blue-soft);color:var(--blue);}
.pill.failed{background:var(--danger-soft);color:var(--danger);}
.pill.muted{background:var(--line);color:var(--muted);}

/* ---------- Filter chips ---------- */
.chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;-ms-overflow-style:none;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:8px 14px;border-radius:20px;background:var(--card);box-shadow:var(--shadow);
  font-size:13px;font-weight:600;color:var(--muted);transition:all .15s;}
.chip.active{background:var(--pink);color:#fff;box-shadow:0 4px 12px rgba(255,92,138,.32);}

/* ---------- List cards ---------- */
.lc{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:11px;animation:fade .2s ease;}
.lc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.lc-id{font-family:'Fredoka';font-weight:700;font-size:15px;}
.lc-sub{font-size:12.5px;color:var(--muted);margin-top:2px;}
.lc-total{font-family:'Fredoka';font-weight:700;font-size:17px;color:var(--pink-dark);}
.lc-meta{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:10px;font-size:12.5px;color:var(--muted);}
.lc-meta b{color:var(--choco);font-weight:600;}
.lc-actions{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;}

/* ---------- Product row ---------- */
.pr{display:flex;gap:12px;align-items:center;}
.pr-img{width:56px;height:56px;border-radius:14px;background:var(--cream);display:grid;place-items:center;
  font-size:26px;flex-shrink:0;overflow:hidden;border:1px solid var(--line);}
.pr-img img{width:100%;height:100%;object-fit:cover;}
.pr-body{flex:1;min-width:0;}
.pr-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-price{font-family:'Fredoka';font-weight:700;color:var(--pink-dark);font-size:15px;margin-top:2px;}
.pr-tags{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}

/* ---------- Buttons ---------- */
.btn{padding:9px 14px;border-radius:12px;font-weight:700;font-size:13.5px;display:inline-flex;
  align-items:center;justify-content:center;gap:6px;transition:transform .1s,opacity .15s;}
.btn:active{transform:scale(.96);}
.btn.primary{background:var(--pink);color:#fff;box-shadow:0 4px 12px rgba(255,92,138,.3);}
.btn.soft{background:var(--pink-soft);color:var(--pink-dark);}
.btn.ghost{background:var(--cream);color:var(--choco);border:1.5px solid var(--line);}
.btn.mint{background:var(--mint-soft);color:#1FA89E;}
.btn.danger{background:var(--danger-soft);color:var(--danger);}
.btn.block{width:100%;padding:14px;font-size:15px;border-radius:14px;}
.btn.sm{padding:7px 11px;font-size:12.5px;border-radius:10px;}
.btn:disabled{opacity:.5;pointer-events:none;}

/* ---------- FAB ---------- */
.fab{position:fixed;right:calc(50% - 280px + 18px);bottom:100px;z-index:35;
  width:54px;height:54px;border-radius:18px;background:var(--pink);color:#fff;
  font-size:26px;display:grid;place-items:center;box-shadow:0 10px 26px rgba(255,92,138,.45);transition:transform .12s;}
.fab:active{transform:scale(.9);}
@media(max-width:600px){.fab{right:18px;}}

/* ---------- Bottom nav ---------- */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:40;max-width:560px;margin:0 auto;
  background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;
  font-size:10.5px;font-weight:600;color:var(--muted);transition:color .15s;}
.nav-item .ic{font-size:21px;line-height:1;}
.nav-item.active{color:var(--pink);}

/* ---------- Modal ---------- */
.modal-wrap{position:fixed;inset:0;z-index:60;display:none;align-items:flex-end;justify-content:center;}
.modal-wrap.open{display:flex;}
.modal-bg{position:absolute;inset:0;background:rgba(58,42,36,.45);animation:fade .2s;}
.modal{position:relative;background:var(--card);width:100%;max-width:560px;border-radius:24px 24px 0 0;
  padding:8px 18px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow-y:auto;
  animation:slideup .3s cubic-bezier(.2,.9,.25,1);box-shadow:var(--shadow-lg);}
@keyframes slideup{from{transform:translateY(100%);}to{transform:none;}}
.modal-grip{width:42px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 14px;}
.modal h2{font-size:20px;margin-bottom:4px;}
.modal .modal-sub{font-size:13px;color:var(--muted);margin-bottom:18px;}

/* ---------- Form ---------- */
.field{margin-bottom:14px;}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--choco);margin-bottom:6px;}
.field label .opt{color:var(--muted);font-weight:500;}
.field input,.field select,.field textarea{
  background:var(--cream);border:1.5px solid var(--line);border-radius:12px;padding:12px 13px;
  color:var(--choco);transition:border-color .15s;outline:none;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--pink);}
.field textarea{resize:vertical;min-height:70px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:12px 13px;
  background:var(--cream);border-radius:12px;border:1.5px solid var(--line);margin-bottom:14px;}
.switch-row span{font-size:13.5px;font-weight:600;}
.switch{width:46px;height:27px;border-radius:20px;background:var(--line);position:relative;transition:background .2s;flex-shrink:0;}
.switch.on{background:var(--mint);}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;
  background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s;}
.switch.on::after{transform:translateX(19px);}

/* image picker */
.img-pick{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.img-thumb{width:62px;height:62px;border-radius:14px;overflow:hidden;border:1px solid var(--line);position:relative;background:var(--cream);}
.img-thumb img{width:100%;height:100%;object-fit:cover;}
.img-thumb .x{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;
  background:rgba(0,0,0,.55);color:#fff;font-size:11px;display:grid;place-items:center;}
.img-add{width:62px;height:62px;border-radius:14px;border:1.5px dashed var(--pink);color:var(--pink);
  display:grid;place-items:center;font-size:22px;background:var(--pink-soft);}

/* ---------- States ---------- */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty .emo{font-size:46px;margin-bottom:12px;}
.empty .t{font-family:'Fredoka';font-weight:600;font-size:17px;color:var(--choco);margin-bottom:5px;}
.empty .d{font-size:13.5px;line-height:1.5;}
.loader{text-align:center;padding:54px 0;}
.spinner{width:38px;height:38px;border:3.5px solid var(--pink-soft);border-top-color:var(--pink);
  border-radius:50%;margin:0 auto;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader p{margin-top:13px;color:var(--muted);font-size:13.5px;}

/* ---------- Toast ---------- */
.toast-wrap{position:fixed;top:14px;left:0;right:0;z-index:80;display:flex;flex-direction:column;
  align-items:center;gap:8px;pointer-events:none;padding:0 16px;}
.toast{background:var(--choco);color:#fff;padding:11px 16px;border-radius:14px;font-size:13.5px;font-weight:600;
  box-shadow:var(--shadow-lg);max-width:520px;animation:toastin .3s;display:flex;align-items:center;gap:8px;}
.toast.ok{background:var(--ok);} .toast.err{background:var(--danger);}
@keyframes toastin{from{transform:translateY(-16px);opacity:0;}to{transform:none;opacity:1;}}

/* gate */
.gate{display:grid;place-items:center;min-height:100vh;padding:30px;text-align:center;}
.gate .emo{font-size:60px;margin-bottom:18px;}
.gate h2{font-size:22px;margin-bottom:10px;}
.gate p{color:var(--muted);font-size:14.5px;line-height:1.55;max-width:320px;}
</style>
</head>
<body>
<div id="app">
  <div class="loader" style="padding-top:120px"><div class="spinner"></div><p>Yuklanmoqda…</p></div>
</div>
<div class="toast-wrap" id="toasts"></div>
<div class="modal-wrap" id="modal"><div class="modal-bg" onclick="closeModal()"></div><div class="modal" id="modalBody"></div></div>

<script src="app.js"></script>
</body>
</html>
